---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - gnupg
      - ca-certificates
      - apt-transport-https
      - software-properties-common
      - python3
      - python3-pip
    state: present

- name: Add VM IP to /etc/hosts inside VM
  lineinfile:
    path: /etc/hosts
    line: "{{ vm_ip }} vault.local jenkins.local zabbix.local"
    state: present